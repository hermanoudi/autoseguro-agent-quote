services:
  quote-api:
    build: ./quote-service
    ports:
      - "8000:8000"
    environment:
      # instabilidade simulada (de proposito) -- ajuste se quiser durante o dev
      QUOTE_FAILURE_RATE: "0.20"
      QUOTE_SLOW_RATE: "0.10"
      QUOTE_SLOW_SECONDS: "8"
      # QUOTE_SEED: "42"   # descomente p/ falhas reproduziveis
    restart: unless-stopped

  quote-agent:
    build: ./agent-service
    ports:
      - "8001:8001"
    environment:
      QUOTE_SERVICE_URL: "http://quote-api:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      - quote-api
    restart: unless-stopped
